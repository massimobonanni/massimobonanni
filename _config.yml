title: Massimo Bonanni
description: >-
  Azure Technical Trainer @ Microsoft. Technical sessions, talks, videos and
  slides from local and international events.
author: Massimo Bonanni

# Custom domain (matches the CNAME file). Root domain => empty baseurl.
url: "https://info.massimobonanni.it"
baseurl: ""

# Theme used to render the pages
theme: minima

# Curate the minima top navigation. Without this, minima lists every page that
# has a title (all technical-session pages get one via jekyll-titles-from-headings),
# which floods the home page header with the whole session list. Restrict it to
# the meaningful top-level pages.
header_pages:
  - VideoRecap.md
  - TechnicalSessions2025.md
  - TechnicalSessions2024.md
  - TechnicalSessions2023.md
  - TechnicalSessions2022.md
  - TechnicalSessions2021.md
  - TechnicalSessions2020.md

# Markdown engine
markdown: kramdown
kramdown:
  input: GFM

# GitHub Pages default plugin that renders README.md as the site index
# (no index.md needed).
plugins:
  - jekyll-readme-index

# Apply the theme "page" layout to every content page so the Markdown files
# (VideoRecap, yearly archives, individual sessions) render as styled HTML.
defaults:
  - scope:
      path: ""
    values:
      layout: page

# Do not process these when building the site
exclude:
  - .gitignore
  - README.md.saved.bak
  - "*.sln"
  - "*.saved.bak"
  - vendor
  - vendor/bundle
  - .bundle
