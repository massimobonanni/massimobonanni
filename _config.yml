# Custom domain (matches the CNAME file). Root domain => empty baseurl.
url: "https://info.massimobonanni.it"
baseurl: ""

# Richer theme rendered via GitHub Pages remote_theme (built by the Actions
# workflow). Minimal Mistakes adds an author sidebar, color skins, a search box
# and a curated masthead navigation (see _data/navigation.yml). The top nav is
# no longer driven by header_pages: minima's option is ignored by this theme.
remote_theme: "mmistakes/minimal-mistakes@4.26.2"

# Minimal Mistakes color skin.
# Options: default, air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise.
minimal_mistakes_skin: "air"

# Client-side (lunr) search box in the masthead.
search: true

# jekyll-titles-from-headings (a default GitHub Pages plugin) derives each page
# title from its first heading. strip_title removes that leading heading from the
# body so the title is not shown twice, because the Minimal Mistakes "single"
# layout already renders page.title as the page header. The README home is
# unaffected: it starts with an HTML banner, not a heading.
titles_from_headings:
  strip_title: true

# Markdown engine
markdown: kramdown
kramdown:
  input: GFM

# GitHub Pages default plugin that renders README.md as the site index
# (no index.md needed).
plugins:
  - jekyll-readme-index
  - jekyll-remote-theme
  - jekyll-include-cache

# Apply the Minimal Mistakes "single" layout to every content page (the README
# home, VideoRecap, yearly archives and individual sessions) and show the author
# profile sidebar with a table of contents on each of them.
defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true
      toc: true
      toc_sticky: true

# Do not process these when building the site
exclude:
  - .gitignore
  - README.md.saved.bak
  - "*.sln"
  - "*.saved.bak"
  - vendor
  - vendor/bundle
  - .bundle
